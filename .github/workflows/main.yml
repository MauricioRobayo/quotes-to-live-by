name: deploy
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - name: Validate JSON
        run: pnpm run validate
      - name: Lint JSON
        run: pnpm run lint
